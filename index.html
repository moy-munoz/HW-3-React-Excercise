<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ToDO -->
    <div class="fixed-header">
        <h1> Movie Explorer </h1>
    </div>

    <div class="search">
        <label for="movie">
            <input type="text" placeholder="Enter movie here...">
        </label>
        <div class="dropdown">
        <button class="sort-btn">Sort By</button>
            <div class="dropdown-content">
                <a href="#">Release Date (Asc)</a>
                <a href="#">Release Date (Desc)</a>
                <a href="#">Rating (Asc)</a>
                <a href="#">Rating (Desc)</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
